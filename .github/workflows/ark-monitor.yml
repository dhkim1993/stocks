name: ARK 펀드 포트폴리오 모니터링

on:
  # GitHub Actions 최소 cron 간격은 5분
  # 각 실행마다 내부적으로 1분 간격 x 5회 루프 → 실질적 1분 단위 모니터링
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      loop_minutes:
        description: "루프 실행 시간(분)"
        required: false
        default: "5"

jobs:
  monitor:
    name: ARK Portfolio Monitor
    runs-on: ubuntu-latest
    permissions:
      actions: read   # 이전 실행 artifact 다운로드용
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 이전 실행에서 저장한 ark_state.json 을 내려받아 변경 감지에 사용
      - name: 이전 포트폴리오 상태 복원
        run: |
          PREV_RUN=$(gh run list \
            --workflow=ark-monitor.yml \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -n "$PREV_RUN" ]; then
            gh run download "$PREV_RUN" --name ark-state --dir . \
              && echo "상태 파일 복원 완료 (run: $PREV_RUN)" \
              || echo "아티팩트 없음 — 첫 실행으로 처리"
          else
            echo "이전 성공 실행 없음 — 첫 실행으로 처리"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: ARK 펀드 포트폴리오 모니터링 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ARK_STATE_FILE: ark_state.json
        run: |
          LOOP_MINUTES="${{ github.event.inputs.loop_minutes || '5' }}"
          python ark_monitor.py --mode loop --loop-minutes "$LOOP_MINUTES" --interval 1

      # 실행 후 상태 파일을 artifact로 저장 → 다음 실행에서 복원
      - name: 포트폴리오 상태 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ark-state
          path: ark_state.json
          retention-days: 7
          overwrite: true
